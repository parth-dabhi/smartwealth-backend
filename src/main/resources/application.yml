spring:
  application:
    name: smartwealth-backend

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none   # Flyway manages schema
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  cache:
    type: redis

jwt:
  secret:
    access: ${JWT_ACCESS_SECRET}
    refresh: ${JWT_REFRESH_SECRET}
  expiry:
    access: ${JWT_ACCESS_EXPIRY}
    refresh: ${JWT_REFRESH_EXPIRY}

smartwealth:
  limits:
    max-wallet-balance: 10000000.00
  mail:
    from: ${MAIL_USERNAME}
    from-name: SmartWealth

idempotency:
  ttl: ${IDEMPOTENCY_TTL_MINUTES:5}m

sip:
  failure:
    max-attempts: 3

logging:
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"